<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homepage</title>
  <link rel="icon" id="tab-icon" type="image/png" href="backgrounds/tab-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Video Background -->
  <video id="bg-video" class="bg-video" autoplay muted loop playsinline>
    <source id="bg-video-src" src="backgrounds/bg1.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <!-- Date & Time (top-left) -->
  <div class="datetime-widget">
    <div class="time" id="time">--:--</div>
    <div class="date" id="date">Loading...</div>
  </div>

  <!-- Cursor Trail Canvas -->
  <canvas id="cursor-canvas"></canvas>

  <!-- Search (center-bottom) -->
  <div class="search-wrapper">
    <form class="search-box" id="search-form" action="" method="GET">
      <input type="text" id="search-input" name="q" placeholder="Loading..." autocomplete="off" autofocus />
      <button type="submit">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </form>
  </div>

  <!-- Quote Widget (bottom-right) -->
  <div class="quote-widget" id="quote-widget">
    <div class="quote-text" id="quote-text">"..."</div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <!-- Inventory Hub Logo -->
  <div class="inventory-logo-btn" id="inventory-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path
        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
      </path>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
      <line x1="12" y1="22.08" x2="12" y2="12"></line>
    </svg>
    <span>Inventory</span>
  </div>

  <!-- Now Playing Widget (Hidden by default) -->
  <div id="now-playing-widget" class="now-playing-widget">
    <div class="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="np-info">
      <div class="np-label">Now Playing</div>
      <div id="np-title" class="np-title">Loading track data...</div>
    </div>
  </div>

  <!-- Inventory Hub Modal -->
  <div class="modal-overlay" id="inventory-overlay">
    <div class="modal-content inventory-content">
      <div class="modal-header">
        <div class="modal-title">System Inventory</div>
        <div class="modal-actions" style="display: flex; gap: 0.5rem; align-items: center;">
          <button class="modal-icon-btn" id="inventory-edit-btn" title="Edit Inventory">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </button>
          <button class="modal-close" id="inventory-close">&times;</button>
        </div>
      </div>
      <div class="inventory-grid" id="inventory-grid">
        <!-- Tools will be dynamically injected here by script.js -->
      </div>
    </div>
  </div>

  <!-- Anime Schedule Modal -->
  <div class="modal-overlay" id="schedule-overlay">
    <div class="modal-content schedule-modal-content">
      <div class="modal-header">
        <div class="modal-title">Anime Schedule</div>
        <button class="modal-close" id="schedule-close">&times;</button>
      </div>
      <div class="schedule-container" id="schedule-container">
        <!-- Anime items will be injected here -->
        <div class="loading-text">Decoupling Data Stream...</div>
      </div>
      <div class="day-nav">
        <button id="prev-day">&lt;</button>
        <span id="current-day-label">Monday</span>
        <button id="next-day">&gt;</button>
      </div>
    </div>
  </div>
  <!-- Spotify Modal -->
  <div class="modal-overlay" id="spotify-overlay">
    <div class="modal-content spotify-modal-content">
      <div class="modal-header">
        <div class="modal-title">Spotify Stream</div>
        <button class="modal-close" id="spotify-close">&times;</button>
      </div>
      <div class="spotify-container" id="spotify-container">
        <!-- The Spotify player will be injected here by the API -->
        <div id="spotify-iframe"></div>
      </div>
    </div>
  </div>

  <!-- QR Generator Modal -->
  <div class="modal-overlay" id="qr-overlay">
    <div class="modal-content qr-modal-content">
      <div class="modal-header">
        <div class="modal-title">QR Generator</div>
        <button class="modal-close" id="qr-close">&times;</button>
      </div>
      <div class="qr-container" id="qr-container">
        <div class="add-link-form" style="max-height: none; padding-top: 1.5rem; opacity: 1;">
          <input type="text" id="qr-input" placeholder="Enter text or URL..." autocomplete="off">
          <button id="qr-generate-btn">Generate QR</button>
        </div>
        <div id="qr-result-container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; min-height: 200px; gap: 1rem;">
          <div class="loading-text" id="qr-placeholder" style="padding: 0;">Awaiting Data...</div>
          <img id="qr-image" style="display: none; width: 200px; height: 200px; border-radius: 8px; box-shadow: 0 0 20px rgba(255,0,60,0.3);" crossorigin="anonymous" />
          <button id="qr-download-btn" style="display: none; background: rgba(255, 0, 60, 0.1); border: 1px solid var(--accent-red); color: white; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.3rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Download Manager Modal -->
  <div class="modal-overlay" id="downloader-overlay">
    <div class="modal-content downloader-modal-content">
      <div class="modal-header">
        <div class="modal-title">Magnet Downloader</div>
        <button class="modal-close" id="downloader-close">&times;</button>
      </div>
      <div class="downloader-container" id="downloader-container">
        <div class="add-link-form" style="max-height: none; padding-top: 1.5rem; opacity: 1;">
          <input type="text" id="dl-url" placeholder="Magnet link only..." autocomplete="off">
          <input type="text" id="dl-dir" placeholder="Save directory (default: downloads)" autocomplete="off" style="margin-top: 0.5rem;">
          <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button id="dl-fetch-btn" style="flex: 1; background: var(--surface-light); border: 1px solid rgba(255, 255, 255, 0.1);">Fetch Metadata</button>
            <button id="dl-start-btn" style="flex: 1;" disabled>Start Download</button>
          </div>
        </div>
        <div id="dl-select-files-container" style="display: none; margin-top: 1rem; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left;">
        </div>
        <div id="downloads-list" class="downloads-list" style="margin-top: 1rem;">
          <!-- Active downloads injected here -->
          <div class="loading-text">No active downloads</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Links Modal -->
  <div class="modal-overlay" id="quicklinks-overlay">
    <div class="modal-content quicklinks-modal-content">
      <div class="modal-header">
        <div class="modal-title">Quick Links</div>
        <div class="modal-actions" style="display: flex; gap: 0.5rem; align-items: center;">
          <!-- Pen Icon for Edit Mode -->
          <button class="modal-icon-btn" id="edit-quicklinks-btn" title="Edit Links">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
          </button>
          <!-- Add Link Button (Hidden until edit mode) -->
          <button class="modal-icon-btn" id="add-quicklink-btn" title="Add Link" style="display: none;">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button class="modal-close" id="quicklinks-close">&times;</button>
        </div>
      </div>

      <!-- Add Link Form (Hidden by default) -->
      <div id="add-link-form" class="add-link-form hidden">
        <input type="text" id="ql-name" placeholder="Name (e.g. GitHub)" autocomplete="off">
        <input type="text" id="ql-url" placeholder="URL (e.g. https://github.com)" autocomplete="off">
        <button id="ql-submit-btn">Done</button>
      </div>

      <div class="quicklinks-container" id="quicklinks-container">
        <!-- Links injected here -->
      </div>
    </div>
  </div>

  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <script src="script.js"></script>
</body>

</html>
